  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#dotGrid)" opacity="0.54"/>
  <rect width="1600" height="1000" filter="url(#grain)" opacity="0.72"/>

