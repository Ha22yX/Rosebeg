<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Abstract artistic human face for design identity">
  <defs>
    <radialGradient id="bg" cx="46%" cy="42%" r="72%">
      <stop offset="0" stop-color="#312160"/>
      <stop offset="0.48" stop-color="#0c0a1a"/>
      <stop offset="1" stop-color="#02030a"/>
    </radialGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7e8"/>
      <stop offset="0.42" stop-color="#dacbe1"/>
      <stop offset="0.72" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#050612"/>
    </linearGradient>
    <linearGradient id="cyanStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#93f3ff"/>
      <stop offset="0.55" stop-color="#dacbe1"/>
      <stop offset="1" stop-color="#b9ff6a"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.58 0 0 0 0 0.95 0 0 0 0 1 0 0 0 0.42 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="grain">
