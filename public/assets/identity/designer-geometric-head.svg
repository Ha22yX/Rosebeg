      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.13"/>
      </feComponentTransfer>
    </filter>
    <pattern id="dotGrid" width="38" height="38" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#dacbe1" fill-opacity="0.16"/>
    </pattern>
    <clipPath id="portraitClip">
